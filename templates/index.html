<!DOCTYPE html>
<html>
<head meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO App</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }


        .container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 420px;
            max-width: 95%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

            h1 {
            text-align: center;
        }

        form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 8px;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background: #0056b3;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 5px;
            background: #fafafa;
            
        }

        li:hover {
            background: #f8f9fa;
        }

        .done {
            text-decoration: line-through;
            color: gray;
        }

        a {
            text-decoration: none;
            color: #007bff;
            margin: 0 5px;
        }

        a:hover {
            text-decoration: underline;
        }
        @media (max-width: 600px) {
            form {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }

    </style>
</head>

<body>

<div class="container">
    <h1>📝 TODO List</h1>
    
    {% for msg in get_flashed_messages() %}
        <div style="background:#d4edda; padding:10px; margin-bottom:10px; border-radius:5px;">
            {{ msg }}
        </div>
    {% endfor %}

    <p style="text-align:center; color: gray;">
        Всего задач: {{ tasks|length }}
    </p>

    <div style="margin-bottom: 15px; text-align: center;">
        <a href="/?filter=all"
        style="font-weight: {% if filter_type == 'all' %}bold{% else %}normal{% endif %};">
            Все
        </a> |

        <a href="/?filter=active"
        style="font-weight: {% if filter_type == 'active' %}bold{% else %}normal{% endif %};">
            Активные
        </a> |

        <a href="/?filter=done"
        style="font-weight: {% if filter_type == 'done' %}bold{% else %}normal{% endif %};">
            Выполненные
        </a>
    </div>

    <div style="text-align:center; margin-bottom: 10px;">
    <a href="/clear_done" style="color: red;">
        🧹 Очистить выполненные
    </a>
    </div>

    <form method="POST">
        <input type="text" name="task" placeholder="Новая задача">
        <button type="submit">Добавить</button>
    </form>

    <ul>
        {% for task in tasks %}
            <li draggable="true">
                <span class="{{ 'done' if task['completed'] == 1 else '' }}">
                    {{ task["content"] }}
                </span>

                <div>
                    <a href="/toggle/{{ task['id'] }}">✔️</a>
                    <a href="/delete/{{ task['id'] }}">❌</a>
                </div>
            </li>
        {% endfor %}
    </ul>

</div>
<script>
let dragged = null;

document.querySelectorAll("li").forEach(item => {
    item.addEventListener("dragstart", e => {
        dragged = item;
    });

    item.addEventListener("dragover", e => {
        e.preventDefault();
    });

    item.addEventListener("drop", e => {
        e.preventDefault();
        if (dragged && dragged !== item) {
            item.parentNode.insertBefore(dragged, item);
        }
    });
});
</script>
</body>
</html>

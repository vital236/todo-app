<!DOCTYPE html>
<html>
<head>
    <title>TODO App</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }


        .container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 420px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

            h1 {
            text-align: center;
        }

        form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 8px;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background: #0056b3;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            transition: 0.2s;
        }

        li:hover {
            background: #f8f9fa;
        }

        .done {
            text-decoration: line-through;
            color: gray;
        }

        a {
            text-decoration: none;
            color: #007bff;
            margin: 0 5px;
        }

        a:hover {
            text-decoration: underline;
        }


    </style>
</head>

<body>

<div class="container">
    <h1>📝 TODO List</h1>
    
    <div style="margin-bottom: 15px; text-align: center;">
        <a href="/?filter=all">Все</a> |
        <a href="/?filter=active">Активные</a> |
        <a href="/?filter=done">Выполненные</a>
    </div>
    
    <form method="POST">
        <input type="text" name="task" placeholder="Новая задача">
        <button type="submit">Добавить</button>
    </form>

    <ul>
        {% for task in tasks %}
            <li>
                <span class="{{ 'done' if task['completed'] == 1 else '' }}">
                    {{ task["content"] }}
                </span>

                <div>
                    <a href="/toggle/{{ task['id'] }}">✔️</a>
                    <a href="/delete/{{ task['id'] }}">❌</a>
                </div>
            </li>
        {% endfor %}
    </ul>

</div>

</body>
</html>
